<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tesla Supercharger Coverage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; }

    #map { width: 100vw; height: 100vh; }

    #panel {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0,0,0,0.75);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 24px;
      min-width: 340px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    #panel h1 { font-size: 14px; font-weight: 400; color: #aaa; margin-bottom: 12px; letter-spacing: 0.05em; }
    #radius-display { font-size: 32px; font-weight: 600; color: #e82127; margin-bottom: 4px; }

    #slider {
      width: 100%;
      accent-color: #e82127;
      margin: 8px 0 14px;
    }

    .stat { font-size: 13px; color: #ccc; margin: 3px 0; }
    .stat span { color: #fff; font-weight: 600; }
    #status { font-size: 11px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <h1>TESLA SUPERCHARGER COVERAGE</h1>
  <div id="radius-display">50 km</div>
  <input id="slider" type="range" min="0" max="500" value="50" step="1">
  <div class="stat">Global: <span id="global-stat">—</span></div>
  <div class="stat">Viewport: <span id="viewport-stat">—</span></div>
  <div id="status">Loading...</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9/dist.min.js"></script>
<script>
  const API   = 'http://127.0.0.1:8000';
  const LAT_M = 110540.0;
  const LON_M = 111320.0;

  // ── Map ──────────────────────────────────────────────────────────────
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        carto: {
          type: 'raster',
          tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
          tileSize: 512,
          attribution: '© OpenStreetMap © CARTO',
        }
      },
      layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
    },
    center: [13.405, 52.52],
    zoom: 12,
  });

  // ── deck.gl overlay ──────────────────────────────────────────────────
  const deckCanvas = document.createElement('canvas');
  deckCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
  document.getElementById('map').appendChild(deckCanvas);

  const deckgl = new deck.Deck({
    canvas: deckCanvas,
    controller: false,
    layers: [],
  });

  function syncSize() {
    const container = map.getContainer();
    const w = container.offsetWidth;
    const h = container.offsetHeight;
    deckCanvas.style.width  = w + 'px';
    deckCanvas.style.height = h + 'px';
    deckgl.setProps({ width: w, height: h });
  }

  function syncViewState() {
    const c = map.getCenter();
    deckgl.setProps({
      viewState: {
        longitude: c.lng,
        latitude:  c.lat,
        zoom:      map.getZoom(),
        bearing:   map.getBearing(),
        pitch:     map.getPitch(),
      },
    });
  }

  map.on('move',   syncViewState);
  map.on('resize', () => { syncSize(); syncViewState(); });

  // ── UI ───────────────────────────────────────────────────────────────
  const slider       = document.getElementById('slider');
  const radiusLabel  = document.getElementById('radius-display');
  const globalStat   = document.getElementById('global-stat');
  const viewportStat = document.getElementById('viewport-stat');
  const status       = document.getElementById('status');

  let fetchTimer    = null;
  let currentRadius = 50;

  function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    return Math.round(n).toLocaleString();
  }

  // ── Data layer ───────────────────────────────────────────────────────
  function makeCorners(cell_m) {
    const dlat = (cell_m / 2) / LAT_M;
    return px => {
      const dlon = (cell_m / 2) / (LON_M * Math.cos(px.lat * Math.PI / 180));
      return [
        [px.lon - dlon, px.lat - dlat],
        [px.lon + dlon, px.lat - dlat],
        [px.lon + dlon, px.lat + dlat],
        [px.lon - dlon, px.lat + dlat],
      ];
    };
  }

  function buildLayer(pixels, mode, cell_m) {
    if (!pixels || pixels.length === 0) return null;
    const getPolygon = makeCorners(cell_m);

    if (mode === 'native') {
      const maxPop = pixels.reduce((m, p) => Math.max(m, p.pop), 1);
      return new deck.SolidPolygonLayer({
        id: 'cells', data: pixels, getPolygon,
        getFillColor: px => {
          const t = Math.sqrt(px.pop / maxPop);
          return [Math.round(t*80), Math.round(100+t*155), Math.round(t*40), Math.round((0.3+t*0.6)*255)];
        },
        stroked: false, pickable: false,
      });
    } else {
      return new deck.SolidPolygonLayer({
        id: 'cells', data: pixels, getPolygon,
        getFillColor: px => {
          const f = px.fraction;
          const r = f < 0.5 ? 255 : Math.round(255 * (1 - (f - 0.5) * 2));
          const g = f < 0.5 ? Math.round(255 * f * 2) : 255;
          return [r, g, 0, Math.round(180 + f * 60)];
        },
        stroked: false, pickable: false,
      });
    }
  }

  async function fetchCoverage(radius) {
    const r = await fetch(`${API}/coverage?radius=${radius}`);
    const d = await r.json();
    globalStat.textContent = `${fmt(d.covered)} (${(d.fraction*100).toFixed(1)}%)`;
  }

  async function fetchPixels() {
    const b    = map.getBounds();
    const zoom = map.getZoom();

    status.textContent = 'Loading...';
    const lonMin = Math.max(b.getWest(),  -180);
    const lonMax = Math.min(b.getEast(),   180);
    const url = `${API}/pixels?lat_min=${b.getSouth()}&lat_max=${b.getNorth()}&lon_min=${lonMin}&lon_max=${lonMax}&radius=${currentRadius}&zoom=${zoom.toFixed(2)}&max_px=1000000`;

    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();

      const pixels = Array.isArray(d.pixels) ? d.pixels : [];
      const layer  = buildLayer(pixels, d.mode || 'native', d.cell_m || 100);
      deckgl.setProps({ layers: layer ? [layer] : [] });

      const vp = d.viewport || {};
      viewportStat.textContent = `${fmt(vp.pop_covered ?? 0)} / ${fmt(vp.pop_total ?? 0)} (${((vp.fraction ?? 0)*100).toFixed(1)}%)`;
      const modeTag = d.mode === 'aggregated' ? ` · ${Math.round(d.cell_m)}m cells` : '';
      status.textContent = `${(d.count ?? 0).toLocaleString()} cells${d.truncated ? ' (capped)' : ''}${modeTag}`;
    } catch(e) {
      deckgl.setProps({ layers: [] });
      status.textContent = 'Error: ' + e.message;
    }
  }

  function scheduleUpdate() {
    clearTimeout(fetchTimer);
    fetchTimer = setTimeout(fetchPixels, 400);
  }

  slider.addEventListener('input', () => {
    currentRadius = parseInt(slider.value);
    radiusLabel.textContent = currentRadius + ' km';
    fetchCoverage(currentRadius);
    scheduleUpdate();
  });

  map.on('moveend', scheduleUpdate);
  map.on('zoomend', scheduleUpdate);

  map.on('load', () => {
    syncSize();
    syncViewState();
    fetchCoverage(currentRadius);
    fetchPixels();
  });
</script>
</body>
</html>
